<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三峽職人：手路尋蹤</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
  
  body { font-family: 'Noto Serif TC', serif; }
  .fade-in { animation: fadeIn 0.5s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  
  .card-glow-wood { box-shadow: 0 0 20px rgba(180, 83, 9, 0.4), inset 0 0 20px rgba(180, 83, 9, 0.2); border-color: #b45309; }
  .card-glow-metal { box-shadow: 0 0 20px rgba(148, 163, 184, 0.4), inset 0 0 20px rgba(148, 163, 184, 0.2); border-color: #94a3b8; }
  .card-glow-ferm { box-shadow: 0 0 20px rgba(234, 88, 12, 0.4), inset 0 0 20px rgba(234, 88, 12, 0.2); border-color: #ea580c; }
  .card-glow-dye { box-shadow: 0 0 20px rgba(56, 189, 248, 0.4), inset 0 0 20px rgba(56, 189, 248, 0.2); border-color: #38bdf8; }
  .card-glow-tea { box-shadow: 0 0 20px rgba(132, 204, 22, 0.4), inset 0 0 20px rgba(132, 204, 22, 0.2); border-color: #84cc16; }

  .pixel-border {
    position: relative;
    border: 2px solid #475569;
    background: #0f172a;
  }
  .pixel-border::before, .pixel-border::after {
    content: ''; position: absolute; background: #0f172a;
  }
  
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
    background-size: 100% 4px;
  }
</style>
<script>
  const questions = [
    {
      title: "【場景】踏入三峽老街的結界，最先吸引你目光的是？",
      options: [
        { text: "錯綜複雜的古老木造建築細節", type: "wood" },
        { text: "遠處傳來清脆規律的打鐵聲與火光", type: "metal" },
        { text: "隱約飄散在空氣中的豆香與甘醇氣味", type: "ferm" },
        { text: "隨風飄揚的湛藍色布幔與染缸", type: "dye" },
        { text: "陽光灑落在翠綠茶園的開闊景色", type: "tea" }
      ]
    },
    {
      title: "【聽覺】閉上眼，哪種聲音最能平息你的焦慮？",
      options: [
        { text: "木屑輕輕落下、刨刀拂過木材的沙沙聲", type: "wood" },
        { text: "充滿力量與節奏感的高溫金屬敲擊聲", type: "metal" },
        { text: "水氣氤氳與氣泡在甕中剝裂的微小聲音", type: "ferm" },
        { text: "柔軟布料在水中翻攪、流動的波浪聲", type: "dye" },
        { text: "滾水沖泡茶葉、茶湯傾瀉而下的療癒水流聲", type: "tea" }
      ]
    },
    {
      title: "【觸覺】雙手觸碰哪種材質，能讓你感到最踏實？",
      options: [
        { text: "堅實且帶有獨特生長紋理的木頭", type: "wood" },
        { text: "冰冷但能被高溫與力量重塑的金屬", type: "metal" },
        { text: "溫潤且會隨著時間變化的發酵物", type: "ferm" },
        { text: "柔軟且能吸附各種色彩的天然織品", type: "dye" },
        { text: "乾燥且揉捻著大地氣息的茶葉", type: "tea" }
      ]
    },
    {
      title: "【戰鬥】面對一團混亂的突發狀況，你的處理方式是？",
      options: [
        { text: "冷靜擬定計畫，一刀一刀削減多餘的阻礙", type: "wood" },
        { text: "直球對決，用熱情與力道將阻礙鍛造成想要的形狀", type: "metal" },
        { text: "給予時間，讓事情在環境中自然轉化、迎刃而解", type: "ferm" },
        { text: "像水一樣適應環境，用柔韌的姿態包容變化", type: "dye" },
        { text: "吸收經驗，將過程的苦澀轉化為回甘的智慧", type: "tea" }
      ]
    },
    {
      title: "【組隊】在一個團隊中，你通常扮演什麼樣的角色？",
      options: [
        { text: "默默提供穩定的支持，成為團隊的棟樑", type: "wood" },
        { text: "擔任破冰的先鋒，帶動全場氣氛與行動力", type: "metal" },
        { text: "營造舒適的氛圍，讓大家自然地凝聚在一起", type: "ferm" },
        { text: "善於協調不同意見，讓團隊充滿多樣的色彩", type: "dye" },
        { text: "給予溫暖的關懷，療癒身邊疲憊的夥伴", type: "tea" }
      ]
    }
  ];

  const results = {
    wood: {
      class: "木雕匠人", title: "Lv.1 沉穩的木雕匠人", attr: "專注 / 雕琢 / 棟樑",
      stats: { str: 60, agi: 40, int: 85, focus: 99 },
      description: "你擁有極高的專注力，在細節中尋找完美。三峽的木雕職人與你有著同樣的頻率，去老街巷弄裡尋找木屑的香氣，刻畫屬於你的傳說吧！",
      action: "接取任務：前往木雕工作室獲得 5 分鐘微體驗",
      style: "card-glow-wood text-amber-500", btn: "bg-amber-700 hover:bg-amber-600",
      barColor: "bg-amber-500",
      imgUrl: "assets/images/wood-artisan.jpg",
      mapUrl: "https://www.google.com/maps/search/?api=1&query=三峽老街+木雕",
      partner: "dye"
    },
    metal: {
      class: "金工狂戰士", title: "Lv.1 俐落的金工狂戰士", attr: "力量 / 鍛造 / 直球",
      stats: { str: 99, agi: 75, int: 50, focus: 60 },
      description: "你充滿熱情與直覺，喜歡用自己的雙手創造確切的改變。三峽打鐵匠的火光與力道，正是你靈魂的寫照。敲擊出你的專屬裝備吧！",
      action: "接取任務：前往金工工作室進行敲擊體驗一次",
      style: "card-glow-metal text-slate-300", btn: "bg-slate-600 hover:bg-slate-500",
      barColor: "bg-slate-300",
      imgUrl: "assets/images/metal-blacksmith.jpg",
      mapUrl: "https://www.google.com/maps/search/?api=1&query=三峽老街+金工",
      partner: "tea"
    },
    ferm: {
      class: "釀酵鍊金術士", title: "Lv.1 靜待的釀酵鍊金術士", attr: "時間 / 轉化 / 溫潤",
      stats: { str: 30, agi: 40, int: 99, focus: 80 },
      description: "你懂得順應自然，相信時間會帶來最好的魔法。甘樂文創的釀酵坊裡，有著與你一樣溫潤的靈魂。去見證微生物的鍊金術吧！",
      action: "接取任務：前往禾乃川兌換獨家試飲與風味解說",
      style: "card-glow-ferm text-orange-500", btn: "bg-orange-700 hover:bg-orange-600",
      barColor: "bg-orange-500",
      imgUrl: "assets/images/ferm-alchemist.jpg",
      mapUrl: "https://www.google.com/maps/search/?api=1&query=禾乃川國產豆製所",
      partner: "metal"
    },
    dye: {
      class: "藍染水魔法師", title: "Lv.1 柔韌的藍染水魔法師", attr: "柔韌 / 變化 / 包容",
      stats: { str: 40, agi: 85, int: 90, focus: 70 },
      description: "你像水一樣適應各種環境，卻能在浸潤之中留下深刻的色彩。三峽的藍染技藝呼喚著你，去染坊調製你的魔法藥水吧！",
      action: "接取任務：前往藍染工坊領取專屬色彩圖騰卡",
      style: "card-glow-dye text-sky-400", btn: "bg-sky-700 hover:bg-sky-600",
      barColor: "bg-sky-400",
      imgUrl: "assets/images/indigo-dyer.jpg",
      mapUrl: "https://www.google.com/maps/search/?api=1&query=三峽染工坊",
      partner: "wood"
    },
    tea: {
      class: "製茶德魯伊", title: "Lv.1 療癒的製茶德魯伊", attr: "自然 / 療癒 / 回甘",
      stats: { str: 45, agi: 60, int: 85, focus: 90 },
      description: "你與土地有著深刻的連結，總能將生活的苦澀轉化為回甘的智慧。前往三峽的茶行，尋找能治癒隊友的自然靈藥吧！",
      action: "接取任務：前往在地茶行品茗三峽碧螺春",
      style: "card-glow-tea text-lime-400", btn: "bg-lime-700 hover:bg-lime-600",
      barColor: "bg-lime-400",
      imgUrl: "assets/images/tea-master.jpg",
      mapUrl: "https://www.google.com/maps/search/?api=1&query=三峽老街+茶行",
      partner: "ferm"
    }
  };

  const bgmAudios = {
    wood: new Audio('assets/audio/wood.mp3'),
    metal: new Audio('assets/audio/metal.mp3'),
    ferm: new Audio('assets/audio/ferm.mp3'),
    dye: new Audio('assets/audio/dye.mp3'),
    tea: new Audio('assets/audio/tea.mp3')
  };
  
  // 設定所有音效為自動循環播放
  Object.values(bgmAudios).forEach(audio => audio.loop = true);

  let step = 0;
  let scores = { wood: 0, metal: 0, ferm: 0, dye: 0, tea: 0 };
  let finalResult = null;
  let isMuted = false;

  function toggleMute() {
    isMuted = !isMuted;
    const btnIcon = document.getElementById('mute-icon');
    
    if (isMuted) {
      // 靜音：暫停所有音樂
      Object.values(bgmAudios).forEach(audio => audio.pause());
      btnIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
    } else {
      // 解除靜音：如果有結算結果，就繼續播放該音樂
      if (finalResult && step > questions.length && bgmAudios[finalResult]) {
        bgmAudios[finalResult].play().catch(() => {});
      }
      btnIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 10 0 0 1 0 14.14"></path>`;
    }
  }

  function playSound(type) {
    // 停止所有正在播放的音效並重置時間
    Object.values(bgmAudios).forEach(audio => {
      audio.pause();
      audio.currentTime = 0;
    });
    // 如果沒有被靜音，才播放新的音效
    if (bgmAudios[type] && !isMuted) {
      bgmAudios[type].play().catch(() => {});
    }
  }

  function handleStart() {
    step = 1;
    scores = { wood: 0, metal: 0, ferm: 0, dye: 0, tea: 0 };
    Object.values(bgmAudios).forEach(audio => {
      audio.pause();
      audio.currentTime = 0;
    });
    render();
  }

  function handleAnswer(type) {
    scores[type]++;
    // 移除這裡的 playSound(type); 讓答題過程保持純視覺或原有的環境安靜感

    if (step < questions.length) {
      step++;
      render();
    } else {
      calculateResult();
    }
  }

  function calculateResult() {
    let maxType = 'wood';
    let maxScore = scores.wood;
    
    ['metal', 'ferm', 'dye', 'tea'].forEach(type => {
      if (scores[type] > maxScore) {
        maxType = type;
        maxScore = scores[type];
      }
    });

    finalResult = maxType;
    step = questions.length + 1;
    renderCalculating();
    
    // 等待動畫結束後，顯示結果並播放對應音效
    setTimeout(() => {
      renderResult();
      playSound(finalResult);
    }, 2000);
  }

  function downloadCard() {
    const btn = document.getElementById('download-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 靈魂結印中...`;

    const cardElement = document.getElementById('character-card-export');

    document.fonts.ready.then(() => {
      html2canvas(cardElement, {
        scale: 2,
        backgroundColor: '#0f172a',
        useCORS: true,
        logging: false
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `三峽職人_${results[finalResult].class}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.innerHTML = originalText;
      });
    });
  }

  function getUrlParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  function generateShareLink() {
    const baseUrl = window.location.href.split('?')[0];
    const needType = results[finalResult].partner;
    const shareUrl = `${baseUrl}?need=${needType}`;
    
    navigator.clipboard.writeText(shareUrl).then(() => {
      const shareBtn = document.getElementById('share-btn');
      const originalText = shareBtn.innerHTML;
      shareBtn.innerHTML = `已複製招募連結！`;
      setTimeout(() => { shareBtn.innerHTML = originalText; }, 2000);
    });
  }

  function renderLanding() {
    const app = document.getElementById('app');
    const needParam = getUrlParam('need');
    let subtitleHtml = `
      來到三峽，不只走馬看花。<br/>
      憑直覺回答 5 個問題，<br/>
      喚醒你靈魂深處的職人職業，<br/>
      解鎖老街巷弄裡的專屬任務。
    `;

    if (needParam && results[needParam]) {
        subtitleHtml = `
          <span class="text-amber-400 font-bold block mb-2">你的朋友正在尋找【${results[needParam].class}】的隊友！</span>
          測測看你是不是他命中注定的夥伴。<br/>
          喚醒你的職人職業，解鎖三峽專屬任務。
        `;
    }

    app.innerHTML = `
      <div class="flex flex-col items-center justify-center min-h-screen p-6 relative fade-in">
        <div class="z-10 text-center max-w-md w-full pixel-border p-8 shadow-2xl bg-slate-900/90 backdrop-blur-sm">
          <p class="text-xs text-slate-400 tracking-widest mb-4">SANXIA ARTISAN QUEST</p>
          <h1 class="text-3xl font-black text-slate-100 mb-2 leading-tight">
            三峽職人<br/>
            <span class="text-amber-500 text-4xl mt-2 block">手路尋蹤</span>
          </h1>
          
          <div class="my-8 h-px bg-gradient-to-r from-transparent via-slate-500 to-transparent"></div>
          
          <p class="text-slate-400 mb-8 leading-relaxed text-sm">
            ${subtitleHtml}
          </p>
          
          <button onclick="handleStart()" class="w-full bg-slate-800 border-2 border-slate-500 text-slate-200 font-bold py-4 hover:bg-slate-700 hover:border-amber-500 hover:text-amber-400 transition-all active:scale-95 flex items-center justify-center gap-2 tracking-widest">
            START QUEST
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </div>
        <div class="absolute bottom-6 text-xs text-slate-600 tracking-widest z-10">
          © 2026 IMPACT STAR 
        </div>
      </div>
    `;
  }

  function renderQuestion() {
    const app = document.getElementById('app');
    const q = questions[step - 1];
    
    let optionsHtml = '';
    q.options.forEach(opt => {
      optionsHtml += `
        <button onclick="handleAnswer('${opt.type}')" class="text-left w-full p-4 bg-slate-800 border border-slate-700 hover:border-amber-500 hover:bg-slate-800/80 transition-all active:scale-[0.98] group relative overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-r from-amber-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <span class="text-slate-300 font-medium leading-relaxed group-hover:text-amber-400 relative z-10 block pr-6">
            <span class="text-slate-600 mr-2 text-sm">▶</span>${opt.text}
          </span>
        </button>
      `;
    });

    app.innerHTML = `
      <div class="flex flex-col min-h-screen p-6 fade-in max-w-lg mx-auto relative z-10">
        <div class="flex justify-between items-center mb-6 pt-4 border-b border-slate-800 pb-4">
          <span class="text-sm font-bold text-amber-500 tracking-widest">STAGE ${step} / ${questions.length}</span>
          <div class="flex gap-1">
            ${Array.from({length: questions.length}).map((_, i) => `<div class="h-1 w-4 ${i < step ? 'bg-amber-500' : 'bg-slate-800'}"></div>`).join('')}
          </div>
        </div>
        
        <div class="flex-1 flex flex-col justify-center">
          <div class="pixel-border p-6 mb-8 relative bg-slate-900/90 backdrop-blur-sm">
            <div class="absolute -top-3 -left-3 w-6 h-6 border-t-2 border-l-2 border-amber-500"></div>
            <div class="absolute -bottom-3 -right-3 w-6 h-6 border-b-2 border-r-2 border-amber-500"></div>
            <h2 class="text-xl font-bold text-slate-100 leading-relaxed">${q.title}</h2>
          </div>
          <div class="flex flex-col gap-3">
            ${optionsHtml}
          </div>
        </div>
      </div>
    `;
  }

  function renderCalculating() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center fade-in relative z-10">
        <div class="w-16 h-16 border-4 border-slate-700 border-t-amber-500 rounded-full animate-spin mb-8"></div>
        <h2 class="text-xl font-bold tracking-widest text-slate-200 mb-2">正在分析靈魂屬性...</h2>
        <p class="text-slate-500 text-sm">與三峽老街的職人頻率進行同步</p>
      </div>
    `;
  }

  function renderResult() {
    const res = results[finalResult];
    const partnerRes = results[res.partner];
    const app = document.getElementById('app');
    
    const statBar = (label, val, colorClass) => `
      <div class="flex items-center gap-3 text-xs mb-1.5">
        <span class="text-slate-400 w-16 text-right">${label}</span>
        <div class="flex-1 h-1.5 bg-slate-800 rounded-full relative">
          <div class="absolute top-0 left-0 h-full ${colorClass}" style="width: ${val}%"></div>
        </div>
        <span class="text-slate-300 w-6">${val}</span>
      </div>
    `;

    app.innerHTML = `
      <div class="min-h-screen py-10 px-4 fade-in flex flex-col items-center relative z-10">
        <p class="text-slate-400 text-xs tracking-widest mb-4">CHARACTER UNLOCKED</p>
        
        <div id="character-card-export" class="w-full max-w-sm ${res.style} bg-slate-900 border-2 rounded-lg p-1 relative mb-8">
          
          <div class="w-full h-48 bg-slate-800 relative flex items-center justify-center border border-slate-700/50 mb-4 overflow-hidden">
             <img src="${res.imgUrl}" alt="${res.class}" class="absolute inset-0 w-full h-full object-cover scale-[1.08] origin-center z-0" crossorigin="anonymous" />
             <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent z-10"></div>
          </div>
          
          <div class="px-5 pb-5 relative z-20">
            <div class="inline-block px-2 py-0.5 border border-slate-500 rounded text-[10px] tracking-widest mb-3 text-slate-300">${res.attr}</div>
            <h1 class="text-2xl font-black text-slate-100 mb-4">${res.title}</h1>
            
            <div class="bg-slate-950/80 p-3 rounded border border-slate-800 mb-4">
               ${statBar('力量 STR', res.stats.str, res.barColor)}
               ${statBar('敏捷 AGI', res.stats.agi, res.barColor)}
               ${statBar('智力 INT', res.stats.int, res.barColor)}
               ${statBar('專注 FOC', res.stats.focus, res.barColor)}
            </div>

            <p class="text-slate-300 text-sm leading-relaxed mb-2">
              ${res.description}
            </p>
          </div>
        </div>

        <div class="w-full max-w-sm">
          <div class="bg-slate-800 border border-slate-600 rounded-lg p-5 shadow-lg relative overflow-hidden mb-6">
             <h3 class="font-bold text-amber-400 mb-2 flex items-center gap-2 text-sm tracking-wider">
               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
               尋找命定隊友
             </h3>
             <p class="text-slate-300 text-sm leading-relaxed mb-4">
               你的靈魂最需要 <span class="${partnerRes.style} font-bold px-1">${partnerRes.class}</span> 的輔助來平衡力量。
             </p>
             <button id="share-btn" onclick="generateShareLink()" class="w-full bg-slate-700 hover:bg-slate-600 border border-slate-500 text-slate-200 font-bold py-2 transition-all flex items-center justify-center gap-2 tracking-widest text-sm rounded">
               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
               複製招募連結
             </button>
          </div>

          <div class="bg-slate-800 border border-slate-600 rounded-lg p-5 shadow-lg relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full ${res.btn}"></div>
            <div class="flex items-center justify-between mb-2">
              <h3 class="font-bold text-slate-200 flex items-center gap-2 text-sm tracking-wider">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${res.style}"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                專屬任務憑證
              </h3>
            </div>
            
            <p class="text-xs text-amber-400 mb-3 tracking-wide">
              ✨ 抵達三峽後，向店家出示此畫面即可解鎖
            </p>

            <!-- 票券視覺設計 -->
            <div class="bg-slate-900 p-4 border-2 border-dashed border-slate-600 text-slate-200 text-sm font-bold mb-4 text-center relative overflow-hidden">
              <!-- 左右打孔造型 -->
              <div class="absolute -left-3 top-1/2 -translate-y-1/2 w-5 h-5 bg-slate-800 rounded-full border-r-2 border-slate-600"></div>
              <div class="absolute -right-3 top-1/2 -translate-y-1/2 w-5 h-5 bg-slate-800 rounded-full border-l-2 border-slate-600"></div>
              
              <span class="relative z-10">${res.action}</span>
              
              <!-- 假條碼裝飾 -->
              <div class="mt-3 opacity-30 flex justify-center">
                <div class="w-full max-w-[150px] h-6 border-x-[3px] border-l-[6px] border-r-[2px] border-current border-solid flex justify-around gap-[2px]">
                  <div class="w-[2px] bg-current h-full"></div>
                  <div class="w-[4px] bg-current h-full"></div>
                  <div class="w-[1px] bg-current h-full"></div>
                  <div class="w-[3px] bg-current h-full"></div>
                  <div class="w-[5px] bg-current h-full"></div>
                  <div class="w-[2px] bg-current h-full"></div>
                  <div class="w-[1px] bg-current h-full"></div>
                  <div class="w-[4px] bg-current h-full"></div>
                </div>
              </div>
            </div>
            
            <button onclick="window.open('${res.mapUrl}', '_blank')" class="w-full ${res.btn} border border-transparent text-white font-bold py-3 transition-all flex items-center justify-center gap-2 tracking-widest text-sm mb-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              開啟地圖導航
            </button>
            
            <button id="download-btn" onclick="downloadCard()" class="w-full bg-transparent border border-slate-600 text-slate-400 font-bold py-3 hover:bg-slate-700 hover:text-slate-200 transition-all flex items-center justify-center gap-2 tracking-widest text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
              下載角色卡
            </button>
          </div>
          
          <div class="text-center mt-8">
            <button onclick="handleStart()" class="text-slate-500 text-sm hover:text-slate-300 transition-colors tracking-widest">
              [ 重新進行屬性鑑定 ]
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function render() {
    if (step === 0) {
      renderLanding();
    } else if (step > 0 && step <= questions.length) {
      renderQuestion();
    }
  }

  window.onload = () => {
    render();
  };
</script>
</head>
<body class="bg-slate-950 text-slate-200 antialiased font-sans selection:bg-amber-500/30 overflow-x-hidden min-h-screen">
  <div class="scanlines"></div>
  
  <!-- 音效控制按鈕 -->
  <button id="mute-btn" onclick="toggleMute()" class="fixed top-4 right-4 z-[100] p-2.5 bg-slate-800/80 rounded-full border border-slate-600 text-slate-300 hover:text-amber-400 hover:border-amber-500 transition-all backdrop-blur-sm shadow-lg">
    <svg id="mute-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      <path d="M19.07 4.93a10 10 10 0 0 1 0 14.14"></path>
    </svg>
  </button>

  <div id="app"></div>
</body>
</html>
