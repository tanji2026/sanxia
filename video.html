<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三峽職人 - 影片縮圖設計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { amber: '#f59e0b', orange: '#ea580c', dark: '#0f172a' }
                    },
                    fontFamily: { 
                        sans: ['Noto Sans TC', 'sans-serif'],
                        serif: ['Noto Serif TC', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1e293b;
        }

        .thumbnail-container {
            width: 1280px;
            height: 720px;
            background-color: #0f172a;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: top left;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(100, 116, 139, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .perspective-wrapper {
            perspective: 2000px;
        }
        
        .isometric-ui {
            transform: rotateY(-15deg) rotateX(10deg) rotateZ(2deg);
            transform-style: preserve-3d;
        }
        
        .glow-blob-1 {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(245,158,11,0.25) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }
        
        .glow-blob-2 {
            position: absolute;
            bottom: -200px;
            right: -100px;
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(234,88,12,0.2) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%);
            background-size: 60px 60px, 100% 8px;
            z-index: 0;
            opacity: 0.8;
        }
        
        @media (max-width: 1350px) {
            .thumbnail-container { transform: scale(0.8); }
        }
        @media (max-width: 1100px) {
            .thumbnail-container { transform: scale(0.6); }
        }
        @media (max-width: 800px) {
            .thumbnail-container { transform: scale(0.4); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <button id="download-btn" class="fixed top-4 left-4 bg-brand-amber hover:bg-amber-400 text-slate-900 font-bold py-3 px-6 rounded-xl shadow-[0_0_15px_rgba(245,158,11,0.5)] z-50 flex items-center gap-3 transition-all duration-300 transform hover:-translate-y-1 outline-none">
        <i class="fa-solid fa-download text-xl"></i>
        <span>下載高品質縮圖 (PNG)</span>
    </button>

    <div class="thumbnail-container flex items-center" id="thumbnail-canvas">
        <div class="glow-blob-1"></div>
        <div class="glow-blob-2"></div>
        <div class="grid-bg"></div>

        <div class="w-[45%] pl-16 relative z-20 flex flex-col justify-center h-full">
            
            <div class="flex items-center gap-4 mb-8">
                <div class="w-14 h-14 bg-gradient-to-br from-brand-amber to-brand-orange rounded-2xl flex items-center justify-center text-slate-900 font-bold text-3xl shadow-lg shadow-brand-amber/30 border-2 border-amber-300">
                    <i class="fa-solid fa-compass"></i>
                </div>
                <span class="font-black text-4xl tracking-tight text-white font-serif whitespace-nowrap">三峽職人 <span class="text-brand-amber ml-1">手路尋蹤</span></span>
            </div>

            <div class="inline-block bg-brand-amber/10 border-2 border-brand-amber/50 text-brand-amber font-bold px-5 py-2 rounded-full text-lg mb-6 w-max backdrop-blur-sm tracking-widest font-serif whitespace-nowrap">
                地方創生 × 數位互動設計
            </div>

            <h1 class="text-6xl font-black text-white leading-[1.25] mb-6 tracking-wide font-serif whitespace-nowrap" style="text-shadow: 0 10px 20px rgba(0,0,0,0.5);">
                喚醒靈魂深處的<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-brand-orange" style="text-shadow: none;">職人記憶與手路</span>
            </h1>

            <p class="text-2xl text-slate-300 font-bold border-l-4 border-brand-amber pl-5 mt-4 tracking-widest whitespace-nowrap">
                沉浸式心理測驗 ✕ 老街實境尋軌
            </p>
        </div>

        <div class="w-[55%] relative z-10 perspective-wrapper pr-12">
            <div class="isometric-ui w-full relative">
                
                <div class="glass-panel rounded-3xl p-8 w-full max-w-[760px] ml-auto relative">
                    
                    <div class="flex gap-2 mb-6">
                        <div class="w-4 h-4 rounded-full bg-slate-600"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-500"></div>
                        <div class="w-4 h-4 rounded-full bg-brand-amber animate-pulse shadow-[0_0_10px_rgba(245,158,11,0.8)]"></div>
                    </div>

                    <div class="flex gap-4 mb-8">
                        <div class="flex-grow relative">
                            <i class="fa-solid fa-map-location-dot absolute left-5 top-1/2 transform -translate-y-1/2 text-amber-500 text-xl"></i>
                            <div class="w-full bg-slate-900 border-2 border-slate-600 rounded-xl py-4 pl-12 pr-5 text-white text-xl flex items-center font-bold tracking-widest whitespace-nowrap">
                                新北市三峽老街
                                <div class="ml-auto flex items-center gap-3">
                                    <span class="text-base text-slate-400 font-mono">LOCATION SYNC</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gradient-to-r from-brand-amber to-brand-orange text-slate-900 font-black py-4 px-8 rounded-xl shadow-lg shadow-brand-amber/40 text-xl flex items-center tracking-widest whitespace-nowrap">
                            結界展開 <i class="fa-solid fa-fan fa-spin ml-3"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-5 mb-8">
                        
                        <div class="bg-slate-800 border-2 border-amber-600/50 p-5 rounded-2xl flex flex-col gap-3 transform translate-z-10 shadow-2xl relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 text-amber-500/10 text-8xl"><i class="fa-solid fa-hammer"></i></div>
                            <div class="flex items-center gap-4 relative z-10">
                                <div class="bg-slate-900 border-2 border-amber-500 p-3 rounded-xl text-amber-500 text-2xl shadow-[0_0_15px_rgba(245,158,11,0.3)]"><i class="fa-solid fa-hammer"></i></div>
                                <div>
                                    <h4 class="font-black text-white text-xl font-serif tracking-widest whitespace-nowrap">木雕匠人</h4>
                                    <p class="text-amber-400 font-bold text-xs tracking-widest mt-1 whitespace-nowrap">CLASS UNLOCKED</p>
                                </div>
                            </div>
                            <div class="relative z-10 mt-2">
                                <div class="flex justify-between text-xs text-slate-400 mb-1 font-bold"><span>專注力 FOC</span><span>99</span></div>
                                <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden"><div class="h-full bg-amber-500 w-[99%]"></div></div>
                            </div>
                        </div>

                        <div class="bg-slate-800 border-2 border-sky-600/50 p-5 rounded-2xl flex flex-col gap-3 transform translate-z-10 shadow-2xl relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 text-sky-500/10 text-8xl"><i class="fa-solid fa-droplet"></i></div>
                            <div class="flex items-center gap-4 relative z-10">
                                <div class="bg-slate-900 border-2 border-sky-500 p-3 rounded-xl text-sky-400 text-2xl shadow-[0_0_15px_rgba(56,189,248,0.3)]"><i class="fa-solid fa-droplet"></i></div>
                                <div>
                                    <h4 class="font-black text-white text-xl font-serif tracking-widest whitespace-nowrap">藍染魔法師</h4>
                                    <p class="text-sky-400 font-bold text-xs tracking-widest mt-1 whitespace-nowrap">PARTY NEEDED</p>
                                </div>
                            </div>
                            <div class="relative z-10 mt-2">
                                <div class="flex justify-between text-xs text-slate-400 mb-1 font-bold"><span>柔韌度 AGI</span><span>85</span></div>
                                <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden"><div class="h-full bg-sky-400 w-[85%]"></div></div>
                            </div>
                        </div>

                    </div>

                    <div class="bg-slate-900 border-2 border-slate-700 rounded-2xl p-5 flex justify-around items-center h-[140px]">
                        <div class="flex flex-col items-center gap-3 opacity-50"><div class="w-14 h-14 rounded-full border-2 border-slate-500 flex items-center justify-center text-xl text-slate-400"><i class="fa-solid fa-fire-burner"></i></div></div>
                        <div class="flex flex-col items-center gap-3 opacity-50"><div class="w-14 h-14 rounded-full border-2 border-slate-500 flex items-center justify-center text-xl text-slate-400"><i class="fa-solid fa-flask"></i></div></div>
                        <div class="flex flex-col items-center gap-3 relative">
                            <div class="absolute inset-0 bg-amber-500 rounded-full blur-xl opacity-30"></div>
                            <div class="w-16 h-16 rounded-full border-4 border-amber-500 bg-slate-800 flex items-center justify-center text-2xl text-amber-400 shadow-[0_0_20px_rgba(245,158,11,0.5)] z-10"><i class="fa-solid fa-star"></i></div>
                        </div>
                        <div class="flex flex-col items-center gap-3 opacity-50"><div class="w-14 h-14 rounded-full border-2 border-slate-500 flex items-center justify-center text-xl text-slate-400"><i class="fa-solid fa-leaf"></i></div></div>
                        <div class="flex flex-col items-center gap-3 opacity-50"><div class="w-14 h-14 rounded-full border-2 border-slate-500 flex items-center justify-center text-xl text-slate-400"><i class="fa-solid fa-seedling"></i></div></div>
                    </div>

                </div>

                <div class="absolute -bottom-8 -left-16 bg-slate-900 rounded-2xl p-4 shadow-2xl flex items-center gap-4 transform translate-z-20 border-4 border-amber-500 shadow-[0_20px_40px_rgba(0,0,0,0.8)]">
                    <div class="w-14 h-14 rounded-full bg-amber-500/20 border-2 border-amber-500 flex items-center justify-center text-amber-400 text-2xl">
                        <i class="fa-solid fa-scroll"></i>
                    </div>
                    <div>
                        <div class="text-xs text-slate-400 font-bold mb-1 tracking-widest whitespace-nowrap">O2O QUEST VOUCHER</div>
                        <div class="text-xl font-black text-white font-serif tracking-widest whitespace-nowrap">專屬任務憑證解鎖</div>
                    </div>
                    <div class="text-amber-500 text-3xl ml-3"><i class="fa-solid fa-check-circle"></i></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById('download-btn').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            const target = document.getElementById('thumbnail-canvas');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i><span>處理中...</span>';
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.8';

            const originalTransform = target.style.transform;
            target.style.transform = 'scale(1)';

            document.fonts.ready.then(() => {
                setTimeout(() => {
                    html2canvas(target, {
                        width: 1280,
                        height: 720,
                        scale: 2,
                        backgroundColor: '#0f172a',
                        useCORS: true,
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = '三峽職人_影片縮圖.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        
                        target.style.transform = originalTransform;
                        btn.innerHTML = originalText;
                        btn.style.pointerEvents = 'auto';
                        btn.style.opacity = '1';
                    }).catch(err => {
                        target.style.transform = originalTransform;
                        btn.innerHTML = originalText;
                        btn.style.pointerEvents = 'auto';
                        btn.style.opacity = '1';
                    });
                }, 500);
            });
        });
    </script>
</body>
</html>
