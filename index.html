<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪一種三峽手路</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .fade-in { animation: fadeIn 0.4s ease-in-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .spin-slow { animation: spin 2s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
</style>
<script>
  const questions = [
    {
      title: "如果給你一個無行程的週末下午，你會傾向怎麼度過？",
      image: "./assets/images/q1-bg.jpg",
      options: [
        { text: "找一件需要專注力的事情，慢慢刻畫細節", type: "wood" },
        { text: "隨性出門，享受不可預期的驚喜與碰撞", type: "metal" },
        { text: "泡一杯茶，靜靜等待時間帶來的發酵與變化", type: "ferm" }
      ]
    },
    {
      title: "閉上眼睛，哪一種聲音最能讓你感到安心？",
      image: "./assets/images/q2-bg.jpg",
      options: [
        { text: "木屑掉落的沙沙聲", type: "wood" },
        { text: "充滿力量的金屬敲擊聲", type: "metal" },
        { text: "水氣氤氳與氣泡剝裂的微小聲音", type: "ferm" }
      ]
    },
    {
      title: "面對生活中的挑戰，你的處理態度比較像是？",
      image: "./assets/images/q3-bg.jpg",
      options: [
        { text: "擬定計畫，按部就班地削減多餘的阻礙", type: "wood" },
        { text: "直球對決，用熱情與力道將阻礙鍛造成想要的形狀", type: "metal" },
        { text: "給予時間，讓事情在環境中自然轉化、迎刃而解", type: "ferm" }
      ]
    }
  ];

  const results = {
    wood: {
      title: "沉穩內斂的「木雕魂」",
      description: "你喜歡專注於當下，在細節中尋找完美。三峽的木雕職人與你有著同樣的頻率，去老街巷弄裡尋找木屑的香氣吧！",
      action: "兌換專屬見面禮：木雕工作室 5 分鐘微體驗",
      location: "三峽老街 某巷某弄 木雕工作室",
      image: "./assets/images/result-wood.jpg",
      color: "from-amber-700 to-amber-900",
      btnColor: "bg-amber-600 hover:bg-amber-700 text-white"
    },
    metal: {
      title: "大刀闊斧的「金工魂」",
      description: "你充滿熱情與直覺，喜歡用自己的雙手創造確切的改變。三峽打鐵匠的火光與力道，正是你靈魂的寫照。",
      action: "兌換專屬見面禮：金工工作室 敲擊體驗一次",
      location: "三峽老街 某巷某弄 金工工作室",
      image: "./assets/images/result-metal.jpg",
      color: "from-slate-700 to-slate-900",
      btnColor: "bg-slate-700 hover:bg-slate-800 text-white"
    },
    ferm: {
      title: "靜待花開的「發酵魂」",
      description: "你懂得順應自然，相信時間會帶來最好的結果。甘樂文創的釀酵坊裡，有著與你一樣溫潤的靈魂。",
      action: "兌換專屬見面禮：釀酵坊 獨家試飲與風味解說",
      location: "三峽老街 某巷某弄 禾乃川國產豆製所",
      image: "./assets/images/result-ferm.jpg",
      color: "from-orange-600 to-orange-800",
      btnColor: "bg-orange-600 hover:bg-orange-700 text-white"
    }
  };

  let step = 0;
  let scores = { wood: 0, metal: 0, ferm: 0 };
  let finalResult = null;

  const icons = {
    sparkles: `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-600"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>`,
    chevronRight: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`,
    refresh: `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500 spin-slow mb-6"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>`,
    gift: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>`,
    mapPin: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`
  };

  function handleStart() {
    step = 1;
    scores = { wood: 0, metal: 0, ferm: 0 };
    render();
  }

  function handleAnswer(type) {
    scores[type]++;
    if (step < questions.length) {
      step++;
      render();
    } else {
      calculateResult();
    }
  }

  function calculateResult() {
    let maxType = 'wood';
    let maxScore = scores.wood;
    
    if (scores.metal > maxScore) {
      maxType = 'metal';
      maxScore = scores.metal;
    }
    if (scores.ferm > maxScore) {
      maxType = 'ferm';
      maxScore = scores.ferm;
    }

    finalResult = maxType;
    step = questions.length + 1;
    renderCalculating();
    
    setTimeout(() => {
      renderResult();
    }, 2000);
  }

  function renderLanding() {
    return `
      <div class="flex flex-col items-center justify-center min-h-screen bg-stone-100 p-6 relative overflow-hidden fade-in">
        <div class="absolute inset-0 z-0">
          <div class="absolute inset-0 bg-stone-300 flex items-center justify-center text-stone-400">背景圖位置</div>
          <div class="absolute inset-0 bg-gradient-to-br from-stone-200 to-stone-300 opacity-90"></div>
        </div>
        <div class="z-10 text-center max-w-md w-full bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-stone-200">
          <div class="mb-6 flex justify-center">${icons.sparkles}</div>
          <h2 class="text-sm font-bold text-stone-500 tracking-widest mb-2">三峽老街探索指南</h2>
          <h1 class="text-3xl font-black text-stone-800 mb-6 leading-tight">
            你是哪一種<br/>
            <span class="text-amber-700 text-4xl">三峽手路？</span>
          </h1>
          <p class="text-stone-600 mb-8 leading-relaxed">
            來到三峽，不只走馬看花。<br/>
            憑直覺回答 3 個問題，<br/>
            尋找與你靈魂共鳴的職人工藝，<br/>
            解鎖你的專屬隱藏版體驗。
          </p>
          <button onclick="handleStart()" class="w-full bg-stone-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-stone-700 transition-all flex items-center justify-center gap-2 active:scale-95">
            開始測驗 ${icons.chevronRight}
          </button>
        </div>
      </div>
    `;
  }

  function renderQuestion() {
    const q = questions[step - 1];
    let progressBars = '';
    for(let i=0; i<questions.length; i++) {
      progressBars += `<div class="h-1.5 rounded-full transition-all duration-300 ${i < step ? 'w-6 bg-amber-600' : 'w-3 bg-stone-200'}"></div>`;
    }

    let optionsHtml = '';
    q.options.forEach(opt => {
      optionsHtml += `
        <button onclick="handleAnswer('${opt.type}')" class="text-left w-full p-5 bg-white rounded-xl shadow-sm border border-stone-100 hover:border-amber-400 hover:bg-amber-50 hover:shadow-md transition-all active:scale-[0.98] group">
          <span class="text-stone-700 font-medium leading-relaxed group-hover:text-amber-800">${opt.text}</span>
        </button>
      `;
    });

    return `
      <div class="flex flex-col min-h-screen bg-stone-50 p-6 fade-in">
        <div class="w-full max-w-md mx-auto flex flex-col h-full">
          <div class="flex justify-between items-center mb-8 pt-4">
            <span class="text-sm font-bold text-stone-400">Q${step} / ${questions.length}</span>
            <div class="flex gap-1">${progressBars}</div>
          </div>
          <div class="flex-1">
            <div class="w-full h-48 rounded-2xl overflow-hidden mb-8 bg-stone-200 relative shadow-inner flex items-center justify-center text-stone-400">
               題目圖位置
            </div>
            <h2 class="text-2xl font-bold text-stone-800 mb-8 leading-relaxed">${q.title}</h2>
            <div class="flex flex-col gap-4">${optionsHtml}</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderCalculating() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="flex flex-col items-center justify-center min-h-screen bg-stone-800 p-6 text-white fade-in">
        ${icons.refresh}
        <h2 class="text-xl font-bold tracking-widest mb-2 pulse-slow">正在為你尋找...</h2>
        <p class="text-stone-400 text-sm">解讀你的靈魂頻率與三峽巷弄的連結</p>
      </div>
    `;
  }

  function renderResult() {
    const res = results[finalResult];
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="min-h-screen bg-stone-100 pb-12 fade-in">
        <div class="w-full h-64 bg-gradient-to-br ${res.color} relative overflow-hidden shadow-md flex items-center justify-center">
          <div class="absolute inset-0 flex flex-col items-center justify-center text-white p-6 text-center z-10">
            <span class="text-sm font-medium tracking-widest mb-3 opacity-80 border border-white/30 px-3 py-1 rounded-full">你的專屬手路性格</span>
            <h1 class="text-4xl font-black mb-2">${res.title}</h1>
          </div>
        </div>
        <div class="max-w-md mx-auto px-6 -mt-8 relative z-20">
          <div class="bg-white p-6 rounded-2xl shadow-lg mb-6 border border-stone-100">
            <p class="text-stone-600 leading-relaxed text-lg">${res.description}</p>
          </div>
          <div class="bg-white p-6 rounded-2xl shadow-md border border-stone-200 mb-6">
            <h3 class="font-bold text-stone-800 mb-4 flex items-center gap-2">${icons.gift} 憑此畫面即可兌換</h3>
            <div class="bg-stone-50 p-4 rounded-xl border border-stone-200 text-stone-700 font-medium mb-4 shadow-sm text-center">
              ${res.action}
            </div>
            <p class="text-xs text-stone-500 text-center mb-4">不需預約，隨到隨體驗，開啟你的文化碰撞。</p>
            <button class="w-full ${res.btnColor} font-bold py-3.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
              ${icons.mapPin} 開啟導航前往工作室
            </button>
          </div>
          <div class="text-center mt-8">
            <button onclick="handleStart()" class="text-stone-400 text-sm hover:text-stone-600 underline underline-offset-4">
              重新測驗
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function render() {
    const app = document.getElementById('app');
    if (step === 0) {
      app.innerHTML = renderLanding();
    } else if (step > 0 && step <= questions.length) {
      app.innerHTML = renderQuestion();
    }
  }

  window.onload = () => {
    render();
  };
</script>
</head>
<body class="bg-stone-100 text-stone-800 antialiased font-sans selection:bg-amber-200">
  <div id="app"></div>
</body>
</html>
